# Registers a JasperReports font extension (test classpath only) that maps the font families the
# examples use onto the bundled DejaVu TrueType fonts. With this in place every example renders text
# from the same TTF regardless of the fonts installed on the host, so the baseline images produced on
# a developer machine match the ones rendered on CI. See fonts.xml for the family-to-TTF mapping.
# SimpleFontExtensionsRegistryFactory keys off the fixed "simple.font.families" prefix and ignores the
# registry id, so the font-set must be registered under that prefix (with a unique suffix here so it
# coexists with the dejavu jar's and the project's own customfonts.xml registrations).
net.sf.jasperreports.extension.registry.factory.simple.font.families=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
net.sf.jasperreports.extension.simple.font.families.baselinealiases=ch/unibas/medizin/dynamicreports/examples/baseline/fonts.xml
